<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Personalize sua senha</h1>

<div class="painel">

<div class="bloco">

<h3>Número de caracteres</h3>

<div class="contador">

<button id="menos">-</button>

<span id="tamanho">12</span>

<button id="mais">+</button>

</div>

</div>

<div class="bloco">

<h3>Características da senha</h3>

<label><input type="checkbox" id="maiusculas" checked> Letras maiúsculas</label>

<label><input type="checkbox" id="minusculas" checked> Letras minúsculas</label>

<label><input type="checkbox" id="numeros" checked> Números</label>

<label><input type="checkbox" id="simbolos"> Símbolos</label>

</div>

<div class="bloco">

<h3>Força da senha</h3>

<div class="barra">
<div id="forca"></div>
</div>

<p id="textoForca">Fraca</p>

</div>

</div>

<h2>Senha Gerada</h2>

<div class="senha" id="senha"></div>

<h2>Tempo para descobrir</h2>

<p id="tempo"></p>

<button id="gerar">Gerar Nova Senha</button>

</div>

<script src="script.js"></script>

</body>
</html>
